name: hospital_flow_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9

  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  http: ^1.6.0
  provider: ^6.1.5+1
  path_provider: ^2.1.4

flutter_native_splash:
  color: "#0D7B6B"
  image: assets/splash.png
  android_gravity: fill
  fullscreen: true
  android_12:
    color: "#0D7B6B"
    fullscreen: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  firebase_auth_mocks: ^0.15.2
  fake_cloud_firestore: ^4.1.1
  test_cov_console: ^0.2.2
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png